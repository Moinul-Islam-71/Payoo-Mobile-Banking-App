<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./dist/output.css" rel="stylesheet">
    <title>Document</title>
</head>

<body class="bg-[#f4f5f7c4]">

    <div class="container min-h-screen w-full  flex flex-col justify-center items-center gap-8 mx-auto">

        <div id="alert-container" class="fixed top-5 z-50 mx-auto">
            
        </div>


        <div class="flex justify-center w-full px-4">
            <img src="assets/logo/Logo-payoo.png" alt="Logo"
                class="w-full max-w-[150px] md:max-w-[200px] h-auto object-contain">
        </div>

        <form action=""
            class="w-[95%] max-w-sm bg-white p-10 mx-auto rounded-2xl flex flex-col items-center justify-center gap-4">
            <div class="w-full flex flex-col gap-2">
                <label for="" class="text-black font-semibold">Mobile Number</label>
                <input id="mobile-number" type="text" placeholder="Enter your number"
                    class="w-full bg-gray-300 text-gray-500 input rounded-3xl outline-none" />
            </div>

            <div class="w-full flex flex-col gap-2">
                <label for="" class="text-black font-semibold">4 Digit Pin</label>
                <input id="pin-number" type="text" placeholder="Enter 4 Digit Pin"
                    class="w-full bg-gray-300 text-gray-500 input rounded-3xl outline-none" />
            </div>

            <button id="login-btn"
                class="w-full btn btn-block outline-none border-none rounded-3xl mt-8 bg-[#3B25C1]">Login</button>
        </form>
    </div>


    <!-- script.js -->
    <script src="./script/script.js"></script>
</body>

</html>
